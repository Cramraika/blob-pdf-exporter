name: Chrome Web Store Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'After upload, publish to this target (or skip).'
        required: true
        default: 'skip'
        type: choice
        options:
          - skip
          - trustedTesters
          - default

permissions:
  contents: write   # to attach zip to a GitHub Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  store-release:
    name: Pack + upload + (optional) publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cryptography (for SA JWT signing)
        run: pip install --quiet cryptography

      - name: Decode SA JSON
        env:
          CHROME_SA_JSON_B64: ${{ secrets.CHROME_SA_JSON_B64 }}
        run: |
          if [ -z "$CHROME_SA_JSON_B64" ]; then
            echo "::warning::CHROME_SA_JSON_B64 secret not set — store ops will be skipped"
            echo "CHROME_SA_JSON=" >> "$GITHUB_ENV"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/cws"
          echo "$CHROME_SA_JSON_B64" | base64 -d > "$RUNNER_TEMP/cws/sa.json"
          chmod 600 "$RUNNER_TEMP/cws/sa.json"
          echo "CHROME_SA_JSON=$RUNNER_TEMP/cws/sa.json" >> "$GITHUB_ENV"

      - name: Decode CRX signing key
        env:
          CHROME_CRX_PRIVATE_KEY_B64: ${{ secrets.CHROME_CRX_PRIVATE_KEY_B64 }}
          CRX_OPTED_IN: ${{ vars.CRX_OPTED_IN }}
        run: |
          # Verified CRX uploads is a two-gate switch:
          #   1. CHROME_CRX_PRIVATE_KEY_B64 secret must be set, AND
          #   2. CRX_OPTED_IN repo variable must be 'true' (operator flips
          #      this AFTER pasting the public key in the dashboard's
          #      Verified CRX Uploads section — see docs/store/SETUP.md).
          # Until both are satisfied, upload stays ZIP (CWS-managed signing).
          if [ "$CRX_OPTED_IN" != "true" ]; then
            echo "CRX_OPTED_IN != true — upload will use ZIP (pre-opt-in mode)"
            echo "CRX_KEY=" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "$CHROME_CRX_PRIVATE_KEY_B64" ]; then
            echo "::warning::CRX_OPTED_IN=true but CHROME_CRX_PRIVATE_KEY_B64 missing"
            echo "CRX_KEY=" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "$CHROME_CRX_PRIVATE_KEY_B64" | base64 -d > "$RUNNER_TEMP/cws/crx-key.pem"
          chmod 600 "$RUNNER_TEMP/cws/crx-key.pem"
          echo "CRX_KEY=$RUNNER_TEMP/cws/crx-key.pem" >> "$GITHUB_ENV"

      - name: Pre-flight — manifest version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "FAIL: tag $GITHUB_REF_NAME ($TAG_VERSION) != manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "tag/manifest version match: $TAG_VERSION"

      - name: Pack extension zip
        id: pack
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          ZIP_NAME="blob-pdf-exporter-v${VERSION}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            src/ \
            vendor/ \
            icons/ \
            LICENSE \
            README.md \
            -x "*.DS_Store" "chrome-store-assets/*" "docs/*" "*.md.skeleton*"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ls -la "$ZIP_NAME"
          sha256sum "$ZIP_NAME"

      - name: Sign CRX (verified CRX uploads)
        id: crx
        if: env.CRX_KEY != ''
        run: |
          CRX_NAME="blob-pdf-exporter-v${{ steps.pack.outputs.version }}.crx"
          python3 scripts/pack-crx.py \
            --zip "${{ steps.pack.outputs.zip_name }}" \
            --key "$CRX_KEY" \
            --out "$CRX_NAME"
          echo "crx_name=$CRX_NAME" >> "$GITHUB_OUTPUT"
          ls -la "$CRX_NAME"

      - name: Choose upload package (CRX if signed, else ZIP)
        id: pkg
        run: |
          if [ -n "${{ steps.crx.outputs.crx_name }}" ]; then
            echo "package=${{ steps.crx.outputs.crx_name }}" >> "$GITHUB_OUTPUT"
            echo "Using signed CRX: ${{ steps.crx.outputs.crx_name }}"
          else
            echo "package=${{ steps.pack.outputs.zip_name }}" >> "$GITHUB_OUTPUT"
            echo "Using ZIP: ${{ steps.pack.outputs.zip_name }}"
          fi

      - name: Status (current item state)
        if: env.CHROME_SA_JSON != ''
        env:
          CHROME_PUBLISHER_EMAIL: ${{ secrets.CHROME_PUBLISHER_EMAIL }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          python3 scripts/chrome-store-publisher.py status

      - name: Upload to Chrome Web Store
        if: env.CHROME_SA_JSON != ''
        env:
          CHROME_PUBLISHER_EMAIL: ${{ secrets.CHROME_PUBLISHER_EMAIL }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          python3 scripts/chrome-store-publisher.py upload \
            --zip "${{ steps.pkg.outputs.package }}"

      - name: Publish (workflow_dispatch only, if target != skip)
        if: |
          env.CHROME_SA_JSON != '' &&
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.publish_target != 'skip'
        env:
          CHROME_PUBLISHER_EMAIL: ${{ secrets.CHROME_PUBLISHER_EMAIL }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          python3 scripts/chrome-store-publisher.py publish \
            --target "${{ github.event.inputs.publish_target }}"

      - name: Attach zip to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.zip_name }}
          generate_release_notes: true

      - name: Summary
        if: always()
        run: |
          {
            echo "## Chrome Web Store Release — v${{ steps.pack.outputs.version }}"
            echo ""
            echo "- Zip packed: \`${{ steps.pack.outputs.zip_name }}\`"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Ref: ${{ github.ref_name }}"
            if [ -n "$CHROME_SA_JSON" ]; then
              echo "- Auth: Service Account (✓ enabled)"
            else
              echo "- Auth: not configured — see \`docs/store/SETUP.md\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
